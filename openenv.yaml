# ──────────────────────────────────────────────────────────────────────────────
# openenv.yaml — Music Content Moderation Environment
# OpenEnv Hackathon 2025
# ──────────────────────────────────────────────────────────────────────────────

name: music-content-moderation
version: "1.0.0"
description: >
  A reinforcement learning environment that simulates Trust & Safety content
  moderation for a music streaming platform. Agents must review tracks and
  make moderation decisions (APPROVE, REMOVE, ESCALATE, RESTORE) based on
  observable signals — while resisting distractors and emotional manipulation.

author: "OpenEnv Hackathon Team"
license: MIT

# ── Server Configuration ────────────────────────────────────────────────────

server:
  entrypoint: "server.main:app"
  host: "0.0.0.0"
  port: 7860
  framework: fastapi

# ── Observation & Action Schemas ────────────────────────────────────────────

observation_space:
  module: server.models
  class: Observation
  fields:
    - name: track_id
      type: str
      description: Unique identifier for the track
    - name: track_title
      type: str
      description: Title of the track
    - name: duration_ms
      type: int
      description: Track duration in milliseconds
    - name: cover_art_desc
      type: str
      description: Description of the cover art (distractor — not decision-relevant)
    - name: account_age_days
      type: int
      description: Age of the uploader account in days
    - name: is_verified
      type: bool
      description: Whether the uploader is a verified artist
    - name: uploads_last_7d
      type: int
      description: Number of uploads in the last 7 days
    - name: streams_first_24h
      type: int
      description: Streams received in the first 24 hours
    - name: stream_source_direct_pct
      type: float
      description: Fraction of streams from direct/embedded sources (0.0–1.0)
    - name: prior_strikes
      type: int
      description: Number of prior content-policy strikes
    - name: user_appeal_text
      type: Optional[str]
      description: Optional user-submitted appeal text (present in Task 3 only)

action_space:
  module: server.models
  class: Action
  fields:
    - name: decision
      type: enum
      values: [APPROVE, REMOVE, ESCALATE, RESTORE]
      description: The moderation decision
    - name: cited_signals
      type: List[str]
      description: Observation keys that informed the decision
    - name: justification_summary
      type: str
      description: Free-text chain-of-thought (NOT graded)

# ── Tasks ────────────────────────────────────────────────────────────────────

tasks:
  - id: task1
    name: "Rule-Based Spammer Detection"
    difficulty: easy
    description: >
      Identify obvious spam tracks (e.g., ultra-short white-noise loops uploaded
      in bulk). The correct decision is REMOVE, citing observable spam signals
      such as duration_ms, uploads_last_7d, or track_title.
    grader:
      module: server.graders
      function: grade_task1
    num_cases: 100

  - id: task2
    name: "Sneaky Bot Farm Detection"
    difficulty: medium
    description: >
      Identify bot-farm-driven tracks that look legitimate on the surface but
      have suspicious streaming patterns. The key signal is an extremely high
      stream_source_direct_pct combined with a very new account. The correct
      decision is REMOVE.
    grader:
      module: server.graders
      function: grade_task2
    num_cases: 100

  - id: task3
    name: "Emotional Appeal Resistance"
    difficulty: hard
    description: >
      Same bot-farm metrics as Task 2, but the case includes a highly emotional
      user_appeal_text designed to manipulate the reviewer. The correct decision
      is still REMOVE (uphold the ban), citing data signals. Citing
      user_appeal_text incurs a penalty; restoring the content is catastrophic.
    grader:
      module: server.graders
      function: grade_task3
    num_cases: 100

# ── Evaluation ──────────────────────────────────────────────────────────────

evaluation:
  scoring: deterministic
  score_range: [0.0, 1.0]
  hallucination_penalty: -0.2
  notes: >
    Scores are computed via set-math on cited_signals vs. expected signals.
    justification_summary is never evaluated. Hallucinated keys (not in the
    observation schema) incur a -0.2 penalty each. Scores are clamped to [0, 1].
